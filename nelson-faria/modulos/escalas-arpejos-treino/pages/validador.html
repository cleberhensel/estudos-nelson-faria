<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Validador · Eat</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/pickers.css">
  <link rel="stylesheet" href="../css/neck.css">
  <style>
    .val-layout { display: grid; grid-template-columns: 12rem 1fr; gap: 0.5rem; margin-bottom: 0.65rem; }
    @media (max-width: 720px) { .val-layout { grid-template-columns: 1fr; } }
    .val-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem; }
    .degree-grid { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.35rem; }
    .deg-chip {
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      background: var(--surface2);
      font-size: 0.72rem;
      font-weight: 700;
    }
    .deg-chip.hit { background: #69db7c; color: #111; }
    .val-actions { display: flex; gap: 0.35rem; margin-top: 0.5rem; }
    .val-actions button {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .val-actions button.primary { background: var(--accent); color: #111; border-color: var(--accent); }
    #status { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; min-height: 1.2em; }
  </style>
</head>
<body>

<header>
  <h1>Validador de escala</h1>
  <p><a href="index.html">hub</a> · <a href="../../MOD-BRAÇO-01-desvendando-acordes-arpejos-escalas/artefatos/escala-validador.html">versão aula</a></p>
</header>

<div class="val-layout">
  <aside class="val-panel col-key">
    <div class="panel-label" style="font-size:0.55rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.25rem">Tom</div>
    <div class="tonic-big" id="tonic-display">C<small>maior</small></div>
    <div class="family-select"><select id="family-select"></select></div>
    <div class="key-grid" id="key-grid"></div>
  </aside>
  <section class="val-panel">
    <h2 style="font-size:0.85rem;color:#4ecdc4;margin-bottom:0.35rem">Graus</h2>
    <div class="degree-grid" id="degree-grid"></div>
    <div class="val-actions">
      <button type="button" class="primary" id="mic-btn">Ligar microfone</button>
      <button type="button" id="reset-btn">Zerar</button>
    </div>
    <p id="status">Aguardando notas…</p>
  </section>
</div>

<section class="neck-section">
  <h2 style="font-size:0.85rem;color:#4ecdc4;margin-bottom:0.35rem">Referência (A shape)</h2>
  <div class="neck-wrap" id="neck-map"></div>
</section>

<footer><a href="drill-escala.html">Drill</a> · <a href="index.html">Hub</a></footer>

<script src="../js/data/meta/tuning.js"></script>
<script src="../js/data/meta/caged.js"></script>
<script src="../js/data/scales/families.js"></script>
<script src="../js/data/scales/shapes/major-caged.js"></script>
<script src="../js/data/scales/shapes/natural-minor-a.js"></script>
<script src="../js/data/scales/shapes/harmonic-minor-a.js"></script>
<script src="../js/data/scales/shapes/melodic-minor-a.js"></script>
<script src="../js/data/scales/index.js"></script>
<script src="../js/placement.js"></script>
<script src="../js/data/catalog.js"></script>
<script src="../js/key-picker.js"></script>
<script src="../js/scale-family-picker.js"></script>
<script src="../js/neck.js"></script>
<script src="../js/pitch.js"></script>
<script src="../js/eat.js"></script>
<script src="../js/pages/validador-app.js"></script>
</body>
</html>
